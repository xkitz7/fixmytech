        /* Base styles */
        body {
            background-color: #000000;
            color: #00FF00;

            line-height: 1.6;
        }
        
        /* Container for responsive design */
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        /* Header styling with responsive logo */
        .header {
            text-align: center;
            margin-bottom: 2rem;

        }
        
        /* Links */
        a {
            color: #00FF00;
            text-decoration: none;
        }

            text-decoration: underline;
        }
        
        /* Blinking cursor animation */
        .cursor {
            animation: blink 1s steps(1) infinite;
        }
        
        @keyframes blink {
            50% { opacity: 0; }
        }
        
        /* Mobile responsiveness */
        @media only screen and (max-width: 640px) {
            .logo {
                font-size: 1.5rem; /* Smaller logo on mobile */
            }
            
            .menu-item {

            }
            
            body {
                padding: 10px; /* Less padding on mobile */
            }
        }
        
        /* Desktop optimization */
        @media only screen and (min-width: 641px) {
            .logo {
                font-size: 2.5rem; /* Larger logo on desktop */
            }

                font-size: 1.4rem; /* Larger menu text on desktop */
